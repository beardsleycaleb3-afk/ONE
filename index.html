<!DOCTYPE html>
<html>
<head>
    <title>Sultan 47 SNES RPG Console</title>
    <meta name="viewport" content="width=device-width">
    <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;background:#0a0a15;color:#0f0;font:12px monospace;">
    <canvas id="screen" width="256" height="224" style="image-rendering:pixelated;border:2px solid #0f0;"></canvas>
    <div id="hud">
        <div>STRAND: <span id="strand"></span></div>
        <div>S_BUF: <span id="sbuf">0</span> | ACC: <span id="acc">0</span></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
