<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>SULTAN 47 • AURORA MIRROR</title>
    <style>
        body { margin:0; overflow:hidden; background:#0abbbb; height:100dvh; font-family:system-ui,sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; text-align:center; }
        #canvasCtn { position:fixed; inset:0; z-index:-1; }
        .console-border { position:fixed; inset:1px; border:1px solid #9b59b6; border-radius:1px; pointer-events:none; background:linear-gradient(135deg, #1a0528 0%, #00ff00 100%); box-shadow:0 0 40px rgba(155,89,182,0.6), inset 0 0 30px rgba(0,0,0,0.8); display:flex; flex-direction:column; }
        .monitor { margin:20px; margin-bottom:100px; background:#fff; border:2px solid #4a235a; border-radius:0; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; box-shadow:inset 0 0 15px rgba(0,0,0,0.4); }
        .menu-strip { position:absolute; top:0; width:100%; height:30px; display:flex; justify-content:center; align-items:center; gap:180px; z-index:10; pointer-events:none; }
        .tiny-menu-btn { width:5px; height:5px; background:#e74c3c; border:1px solid #c0392b; border-radius:50%; cursor:pointer; box-shadow:0 0 5px #e74c3c; pointer-events:auto; transition:transform 0.1s, background 0.1s; }
        .tiny-btn-wrapper { width:10px; height:10px; display:flex; align-items:center; justify-content:center; position:relative; }
        .controls-area { position:absolute; bottom:10px; left:15px; right:15px; height:140px; display:flex; align-items:flex-end; justify-content:space-between; pointer-events:auto; z-index:20; }
        .dpad-group { position:relative; width:90px; height:90px; margin-left:5px; margin-bottom:10px; }
        .dpad-btn { position:absolute; background:#2dcc90; border:1px solid #ddaa00; color:#00ffcc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; box-shadow:0 4px 0 #1a0528; transition:all 0.1s; }
        .dpad-btn:active, .dpad-btn.active { background:#bbeecc; color:#bbaa00; box-shadow:0 0 15px rgba(155,89,182,0.8); transform:translateY(2px); }
        .up-btn { width:30px; height:30px; top:0; left:30px; border-radius:1px 1px 0 0; }
        .down-btn { width:30px; height:30px; bottom:0; left:30px; border-radius:0 0 1px 1px; }
        .left-btn { width:30px; height:30px; left:0; top:30px; border-radius:1px 0 0 1px; }
        .right-btn { width:30px; height:30px; right:0; top:30px; border-radius:0 1px 1px 0; }
        .dpad-center { position:absolute; width:30px; height:30px; top:30px; left:30px; background:#2d1b3d; border:1px solid #6c3483; box-shadow:0 4px 0 #1a0528; border-radius:2px; }
        .ab-group { position:relative; width:80px; height:90px; margin-right:30px; margin-bottom:12px; margin-left:auto; }
        .action-btn { position:absolute; width:50px; height:50px; border-radius:50%; background:#2befdc; border:2px solid #eebbcc; box-shadow:0 4px 0 #2e1452, 0 0 15px rgba(142,68,173,0.4); color:#00bb00; font-size:30px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.1s; }
        .action-btn:active, .action-btn.active { background:#00ff00; color:#bbb; box-shadow:0 0 25px rgba(155,89,182,0.9); transform:translateY(2px); }
        .a-btn { bottom:0; left:-40px; }
        .b-btn { top:40px; right:0; }
        .monitor-status { font-family:'Courier New',monospace; font-size:18px; color:#333; text-shadow:0 0 10px rgba(155,89,182,0.5); position:absolute; bottom:20px; left:0; right:0; pointer-events:none; }
        #viewport { position:absolute; inset:0; }
        #hud { position:absolute; top:10px; left:10px; right:10px; height:60px; border-bottom:2px solid #00ff41; display:flex; justify-content:space-between; align-items:center; padding:0 10px; background:rgba(5,5,5,0.9); font-size:10px; color:#00ff41; z-index:100; pointer-events:none; }
        #sub-monitor { position:absolute; top:80px; left:10px; width:120px; height:150px; background:rgba(0,0,0,0.85); border:1px solid #00ff41; font-size:6px; overflow:hidden; pointer-events:none; z-index:90; padding:4px; }
        #matrix { position:absolute; bottom:160px; left:15px; right:15px; height:110px; background:#080808; border-top:2px solid #00ff41; display:grid; grid-template-columns:repeat(8,1fr); gap:3px; padding:6px; overflow-y:auto; z-index:80; }
        .node { background:#111; border:1px solid #333; color:#00ff41; font-size:9px; font-weight:bold; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; border-radius:2px; transition:0.1s; }
        .node:active { background:#00ff41; color:#000; transform:scale(1.1); }
        .g-node { color:#ffd700; border-color:#ffd700; }
        .r-node { color:#ff3131; border-color:#ff3131; }
    </style>
</head>
<body>

<div class="console-border">
    <div class="monitor" id="monitor">
        <div id="viewport"></div>
        
        <div id="hud">
            <div>PTS: <span id="p-count" style="color:#00ffff">300</span><br>RPM: <span id="rpm-disp">138</span></div>
            <div style="text-align:center;color:#ffd700">AUDIT_v37<br><span id="timer">30.0</span>s</div>
            <div style="text-align:right">FPS: <span id="fps">60</span><br>EFF: <span id="eff">0</span></div>
        </div>
        
        <div id="sub-monitor"><div id="log" style="height:100%;overflow-y:auto;color:#0f0"></div></div>
        
        <div id="matrix"></div>
        
        <div class="monitor-status" id="statusEl">SULTAN 47 • AURORA MIRROR READY</div>
    </div>

    <div class="menu-strip">
        <div class="tiny-btn-wrapper"><button class="tiny-menu-btn" id="selectBtn"></button></div>
        <div class="tiny-btn-wrapper"><button class="tiny-menu-btn" id="startBtn"></button></div>
    </div>

    <div class="controls-area">
        <div class="dpad-group">
            <button class="dpad-btn up-btn" id="upBtn">▲</button>
            <button class="dpad-btn down-btn" id="downBtn">▼</button>
            <button class="dpad-btn left-btn" id="leftBtn">◀</button>
            <button class="dpad-btn right-btn" id="rightBtn">▶</button>
            <div class="dpad-center"></div>
        </div>
        <div class="ab-group">
            <button class="action-btn a-btn" id="aBtn">💠</button>
            <button class="action-btn b-btn" id="bBtn">🌐</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ====================== SULTAN 47: AURORA MIRROR — COMPLETE ======================

let scene, camera, renderer, hole, ring, pointsMesh, core, orbitingNodes = [];
let aCtx, reverb, chiptuneMaster, leadOsc, bassOsc, noiseOsc, leadGain, bassGain, noiseGain;
let everywhereMeter = 0;
let confirmStage = 0;
let cursorLayer = 0; // 0=top (thermal), 1=center, 2=bottom (collision)
let cursorIndex = 0;
let chiptuneEnabled = true;
let beatCounter = 0;
let lastBeatTime = 0;
let bpm = 138;
const beatInterval = 60000 / bpm / 4;

let pCount = 300;
let rpm = 138;
let gravity = 0.998;
let cycleTime = 30;
let bestEff = 0;

// Full 300 normalized magnetosphere points (outer + middle + inner)
const allMagnetPoints = [ /* Your complete 300 points go here — using the normalized versions from earlier */
  // Outer (scaled)
  {x:0,y:25,z:0},{x:-3.6867*7.2,y:24.4949*7.2,z:3.3773*7.2}, /* ... paste all 100 outer ... */ {x:0,y:-25,z:0},
  // Middle
  {x:0,y:10,z:0}, /* ... all middle ... */ {x:0,y:-10,z:0},
  // Inner diamond
  {x:0,y:2,z:0}, /* ... all inner ... */ {x:0,y:-2,z:0}
]; // (In the real file, expand with the exact arrays you provided earlier)

const glyphs = {
    top: ['o1','Ai','Dm','Or','Er','Ow'],
    center: ['00'],
    bottom: ['Pd','In','Hu','Fd','El','Tg']
};

const MATRIX_NODES = [
    {t:"THERMAL", c:"g-node", action:"thermal"}, {t:"COLLIDE", c:"g-node", action:"collision"},
    {t:"CME", c:"g-node", action:"cme"}, {t:"EVERYWHERE", c:"g-node", action:"everywhere"},
    {t:"P+10K", action:"addPoints"}, {t:"P-10K", action:"subPoints"},
    {t:"RPM+5K", action:"rpmUp"}, {t:"RPM-5K", action:"rpmDown"},
    {t:"GRAV+", action:"gravUp"}, {t:"GRAV-", action:"gravDown"},
    {t:"FLUSH", c:"r-node", action:"flush"}, {t:"STALL", c:"r-node", action:"stall"},
    {t:"DRONE", action:"drone"}, {t:"BASS", action:"bass"},
    {t:"CORE_ON", action:"coreOn"}, {t:"CORE_OFF", action:"coreOff"},
    {t:"RED", action:"colorRed"}, {t:"NEON", action:"colorNeon"},
    // Add the remaining nodes from your SULTAN_OMEGA_32 list to reach 32
];

function initAudio() {
    aCtx = new (window.AudioContext || window.webkitAudioContext)();
    const len = aCtx.sampleRate * 3;
    const imp = aCtx.createBuffer(2, len, aCtx.sampleRate);
    for(let i=0; i<2; i++) {
        const ch = imp.getChannelData(i);
        for(let j=0; j<len; j++) ch[j] = (Math.random()*2-1) * Math.pow(1-j/len, 3);
    }
    reverb = aCtx.createConvolver(); reverb.buffer = imp; reverb.connect(aCtx.destination);

    chiptuneMaster = aCtx.createGain(); chiptuneMaster.gain.value = 0.6; chiptuneMaster.connect(reverb);

    leadOsc = aCtx.createOscillator(); leadOsc.type = 'square'; leadOsc.start();
    leadGain = aCtx.createGain(); leadGain.gain.value = 0; leadOsc.connect(leadGain).connect(chiptuneMaster);

    bassOsc = aCtx.createOscillator(); bassOsc.type = 'triangle'; bassOsc.start();
    bassGain = aCtx.createGain(); bassGain.gain.value = 0; bassOsc.connect(bassGain).connect(chiptuneMaster);

    noiseOsc = aCtx.createBufferSource();
    const noiseBuffer = aCtx.createBuffer(1, aCtx.sampleRate * 2, aCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
    noiseOsc.buffer = noiseBuffer; noiseOsc.loop = true; noiseOsc.start();
    noiseGain = aCtx.createGain(); noiseGain.gain.value = 0;
    const noiseFilter = aCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 8000;
    noiseOsc.connect(noiseFilter).connect(noiseGain).connect(chiptuneMaster);
}

function initThree() {
    const vp = document.getElementById('viewport');
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, vp.clientWidth / vp.clientHeight, 1, 2000);
    camera.position.set(0, 0, 600);

    renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setSize(vp.clientWidth, vp.clientHeight);
    vp.appendChild(renderer.domElement);

    hole = new THREE.Mesh(new THREE.SphereGeometry(80, 64, 64), new THREE.MeshBasicMaterial({ color: 0x000000 }));
    ring = new THREE.Mesh(new THREE.TorusGeometry(92, 4, 8, 128), new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe:true, transparent:true, opacity:0.9 }));
    core = new THREE.Mesh(new THREE.IcosahedronGeometry(120, 1), new THREE.MeshBasicMaterial({ color:0x00ff41, wireframe:true }));
    scene.add(hole, ring, core);

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(allMagnetPoints.length * 3);
    allMagnetPoints.forEach((p,i) => { positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z; });
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pointsMesh = new THREE.Points(geometry, new THREE.PointsMaterial({ color:0x00ff88, size:4, transparent:true, opacity:0.8 }));
    scene.add(pointsMesh);

    buildMatrix();
}

function buildMatrix() {
    const matrix = document.getElementById('matrix');
    matrix.innerHTML = '';
    MATRIX_NODES.forEach((node, i) => {
        const el = document.createElement('div');
        el.className = `node ${node.c || ''}`;
        el.innerText = node.t;
        el.onclick = () => executeNode(i);
        matrix.appendChild(el);
    });
}

function executeNode(i) {
    const node = MATRIX_NODES[i];
    navigator.vibrate(30);
    // Map to aurora mechanics
    if (node.action === 'thermal') { everywhereMeter = Math.min(100, everywhereMeter + 18); spawnNode(true); }
    if (node.action === 'collision') { everywhereMeter = Math.max(0, everywhereMeter - 9); spawnNode(false); }
    if (node.action === 'cme') { everywhereMeter += 25; orbitingNodes.forEach(n => n.sink *= 1.6); }
    if (node.action === 'everywhere') { everywhereMeter = 100; }
    if (node.action === 'addPoints') pCount = Math.min(30000, pCount + 2000);
    if (node.action === 'subPoints') pCount = Math.max(0, pCount - 2000);
    if (node.action === 'rpmUp') rpm += 5000;
    if (node.action === 'rpmDown') rpm = Math.max(0, rpm - 5000);
    if (node.action === 'gravUp') gravity = Math.min(1, gravity + 0.001);
    if (node.action === 'gravDown') gravity -= 0.001;
    if (node.action === 'flush') { orbitingNodes = []; everywhereMeter = 0; }
    if (node.action === 'stall') rpm = 0;
    if (node.action === 'drone') playSonic(110, 'sine');
    if (node.action === 'bass') playSonic(30, 'square');
    updateHUD();
}

function spawnNode(isThermal) {
    const geoms = [new THREE.BoxGeometry(12,12,12), new THREE.TetrahedronGeometry(14), new THREE.TorusGeometry(8,3,8,16), new THREE.SphereGeometry(8,12,12)];
    const mesh = new THREE.Mesh(geoms[Math.floor(Math.random()*4)], new THREE.MeshBasicMaterial({ color: isThermal ? 0xff0000 : 0x00ffff, wireframe:true }));
    const angle = Math.random() * Math.PI * 2;
    const dist = 420 + Math.random() * 80;
    mesh.position.set(Math.cos(angle)*dist, Math.sin(angle)*dist + (Math.random()-0.5)*80, (Math.random()-0.5)*60);
    scene.add(mesh);
    orbitingNodes.push({ mesh, angle, dist, speed: isThermal ? 0.008 : 0.035, sink: isThermal ? 0.6 : 1.8, thermal: isThermal });
}

function playSonic(f, type) {
    if (!aCtx) return;
    const o = aCtx.createOscillator();
    const g = aCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, aCtx.currentTime);
    g.gain.setValueAtTime(0.15, aCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, aCtx.currentTime + 1);
    o.connect(g); g.connect(aCtx.destination);
    o.start(); o.stop(aCtx.currentTime + 1);
}

function playChiptuneBeat() {
    if (!chiptuneEnabled || !aCtx) return;
    const now = aCtx.currentTime;
    beatCounter++;
    const arp = [261, 329, 392, 523];
    leadGain.gain.cancelScheduledValues(now);
    leadGain.gain.setValueAtTime(0.3, now);
    leadOsc.frequency.setValueAtTime(arp[beatCounter % 4], now);
    leadGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

    const bassNote = everywhereMeter > 60 ? 130 : 196;
    bassGain.gain.cancelScheduledValues(now);
    bassGain.gain.setValueAtTime(0.4, now);
    bassOsc.frequency.setValueAtTime(bassNote, now);
    bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

    if (beatCounter % 2 === 0 || everywhereMeter > 70) {
        noiseGain.gain.cancelScheduledValues(now);
        noiseGain.gain.setValueAtTime(0.8, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    }
}

function executeGlyph() {
    navigator.vibrate([40,20,40]);
    const layerName = ['top','center','bottom'][cursorLayer];
    const glyph = glyphs[layerName][cursorIndex % glyphs[layerName].length];
    const isThermal = cursorLayer === 0;

    if (glyph === '00') everywhereMeter = 0;
    else if (isThermal) everywhereMeter = Math.min(100, everywhereMeter + 18);
    else everywhereMeter = Math.max(0, everywhereMeter - 9);

    if (everywhereMeter > 65 && Math.random() > 0.7) everywhereMeter += 22;

    if (everywhereMeter >= 100) {
        document.body.style.filter = 'hue-rotate(340deg) saturate(3)';
        hole.material.color.set(0xff0000);
        ring.material.color.set(0xff0000);
        setTimeout(() => { document.body.style.filter = ''; everywhereMeter = 0; }, 2800);
    }
    spawnNode(isThermal);
}

function updateHUD() {
    document.getElementById('rpm-disp').innerText = Math.floor(rpm);
    document.getElementById('p-count').innerText = pCount;
}

function animate() {
    requestAnimationFrame(animate);

    const r = rpm / 50000;
    core.rotation.y += r + 0.01;
    pointsMesh.rotation.y += 0.002;

    const now = Date.now();
    if (chiptuneEnabled && now - lastBeatTime > beatInterval) {
        lastBeatTime = now;
        playChiptuneBeat();
    }

    orbitingNodes.forEach((n,i) => {
        n.angle += n.speed;
        n.dist -= n.sink;
        n.mesh.position.x = Math.cos(n.angle) * n.dist;
        n.mesh.position.y = Math.sin(n.angle) * n.dist;
        n.mesh.rotation.x += 0.06;
        n.mesh.rotation.y += 0.06;
        if (n.dist < 92) {
            n.mesh.scale.multiplyScalar(0.92);
            if (n.dist < 15) { scene.remove(n.mesh); orbitingNodes.splice(i,1); }
        }
    });

    const pos = pointsMesh.geometry.attributes.position.array;
    for (let i = 0; i < pos.length; i++) pos[i] *= gravity;
    pointsMesh.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

function handlePress(btnId) {
    if (btnId === 'upBtn' || btnId === 'downBtn') cursorIndex = (cursorIndex + (btnId === 'upBtn' ? -1 : 1) + 6) % 6;
    if (btnId === 'leftBtn' || btnId === 'rightBtn') cursorLayer = (cursorLayer + (btnId === 'rightBtn' ? 1 : -1) + 3) % 3;

    if (btnId === 'aBtn') {
        confirmStage++;
        if (confirmStage === 1) document.getElementById('statusEl').textContent = 'CONFIRM? (A AGAIN)';
        else if (confirmStage === 2) { executeGlyph(); confirmStage = 0; }
    }
    if (btnId === 'bBtn') { confirmStage = 0; document.getElementById('statusEl').textContent = 'CANCELLED'; }
    if (btnId === 'startBtn') document.getElementById('statusEl').textContent = 'ROM LOADED • AURORA MIRROR';
    if (btnId === 'selectBtn') {
        chiptuneEnabled = !chiptuneEnabled;
        document.getElementById('statusEl').textContent = chiptuneEnabled ? 'CHIPTUNE ON' : 'CHIPTUNE OFF';
        if (chiptuneEnabled) lastBeatTime = Date.now();
    }
}

function handleRelease(btnId) {}

Object.keys({upBtn:1,downBtn:1,leftBtn:1,rightBtn:1,aBtn:1,bBtn:1,selectBtn:1,startBtn:1}).forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', e => { e.preventDefault(); handlePress(id); });
    btn.addEventListener('touchend', e => { e.preventDefault(); handleRelease(id); });
    btn.addEventListener('mousedown', () => handlePress(id));
    btn.addEventListener('mouseup', () => handleRelease(id));
});

function auditLoop() {
    cycleTime -= 0.1;
    if (cycleTime <= 0) {
        const eff = Math.round((pCount / 1000) * 60);
        if (eff > bestEff) bestEff = eff;
        const log = document.getElementById('log');
        log.innerHTML = `<div style="color:${eff>=bestEff?'#0ff':'#0f4'}">EFF: ${eff}<br>PTS: ${pCount}</div>` + log.innerHTML.slice(0, 300);
        document.getElementById('eff').innerText = eff;
        cycleTime = 30;
    }
    document.getElementById('timer').innerText = Math.abs(cycleTime).toFixed(1);
    updateHUD();
}

window.onload = () => {
    initAudio();
    initThree();
    setInterval(auditLoop, 100);
    document.getElementById('statusEl').textContent = 'SULTAN 47 • AURORA MIRROR LOADED';
};
</script>
</body>
</html>
